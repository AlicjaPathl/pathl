name: Build wheels (Linux + Windows)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel==2.19.2

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_BUILD: "cp311-* cp312-* cp313-*"

      - name: Upload wheels artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ github.run_id }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist
        run: |
          python -m pip install build
          python -m build --sdist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist-${{ github.run_id }}
          path: dist/*.tar.gz

  publish:
    name: Publish to PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    # UWAGA: usunąłem permissions: id-token: write
    steps:
      - name: Download Linux wheels
        uses: actions/download-artifact@v4
        with:
          name: wheels-ubuntu-latest-${{ github.run_id }}
          path: dist-collected

      - name: Download Windows wheels
        uses: actions/download-artifact@v4
        with:
          name: wheels-windows-latest-${{ github.run_id }}
          path: dist-collected

      - name: Download sdist
        uses: actions/download-artifact@v4
        with:
          name: sdist-${{ github.run_id }}
          path: dist-collected

      - name: List downloaded files
        run: |
          echo "📦 Files in dist-collected:"
          ls -la dist-collected/
          echo ""
          echo "📄 File list:"
          for f in dist-collected/*; do
            echo "  $(basename $f)"
          done

      - name: Check wheels
        run: |
          python -m pip install twine
          twine check dist-collected/*.whl dist-collected/*.tar.gz 2>&1 || true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist-collected/
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true  # Zapobiega błędowi 400 przy powtórzeniach
          verbose: true        # Dodane dla lepszego logowania - możesz usunąć później