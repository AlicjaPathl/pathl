name: Build wheels (Linux + Windows)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

jobs:
  # --- Build 1: Linux przenośny (manylinux) + Build 4: Windows ---
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel==2.19.2

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          # Buduje CPython 3.8-3.12, pomija PyPy i musllinux (patrz pyproject.toml)
          CIBW_BUILD: "cp38-* cp39-* cp310-* cp311-* cp312-*"

      - name: Upload wheels artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  # --- Build 2: Fedora (natywny, w kontenerze) ---
  build_wheels_fedora:
    name: Build wheel on Fedora
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          dnf install -y python3 python3-pip python3-devel gcc gcc-c++ make

      - name: Install build tools
        run: python3 -m pip install --upgrade build twine

      - name: Build wheel
        run: python3 -m build --wheel --outdir wheelhouse

      - name: Check wheel
        run: twine check wheelhouse/*.whl

      - name: Upload wheels artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-fedora
          path: ./wheelhouse/*.whl

  # --- Build 3: Debian (natywny, w kontenerze) ---
  build_wheels_debian:
    name: Build wheel on Debian
    runs-on: ubuntu-latest
    container: debian:bookworm
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y python3 python3-pip python3-dev python3-venv gcc make

      - name: Install build tools
        run: python3 -m pip install --break-system-packages --upgrade build twine

      - name: Build wheel
        run: python3 -m build --wheel --outdir wheelhouse

      - name: Check wheel
        run: twine check wheelhouse/*.whl

      - name: Upload wheels artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-debian
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist
        run: |
          python -m pip install build
          python -m build --sdist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    name: Publish to PyPI
    needs: [build_wheels, build_wheels_fedora, build_wheels_debian, build_sdist]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-collected
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist-collected/
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}